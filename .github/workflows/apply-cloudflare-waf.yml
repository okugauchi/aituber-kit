name: Apply Cloudflare WAF API Guard

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Apply or remove the AITuberKit API guard rules
        required: true
        default: apply
        type: choice
        options:
          - apply
          - remove

concurrency:
  group: apply-cloudflare-waf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      OPERATION: ${{ inputs.operation }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ルール定義は src/lib/accessPolicy/routePolicies.ts + scripts/waf/waf.config.json
      # から生成される（docs/access-policy-design.md §6）。
      # generate-waf-rules.mjs は Node の TypeScript type stripping で
      # routePolicies.ts を直接 import するため Node 24 が必要。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Apply Cloudflare WAF rules
        run: node scripts/waf/apply-cloudflare-waf.mjs

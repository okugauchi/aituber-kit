name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "has-secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets not configured. Skipping deployment."
          fi

  deploy:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install canvas dependencies (cairo)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Setup npm
        run: npm install -g npm@^11.6.2

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          node -e "const { execSync } = require('child_process'); const nodeMajor = Number(process.versions.node.split('.')[0]); const npmVersion = execSync('npm --version', { encoding: 'utf8' }).trim().split('.').map(Number); if (nodeMajor !== 24 || npmVersion[0] !== 11 || npmVersion[1] < 6 || (npmVersion[1] === 6 && npmVersion[2] < 2)) process.exit(1);"

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Setup environment variables
        run: |
          : > .env.local
          if [ -n "$CLOUDFLARE_ENV_FILE" ]; then
            printf '%s\n' "$CLOUDFLARE_ENV_FILE" >> .env.local
          fi
          if [ -n "$CLOUDFLARE_PUBLIC_ENV_APPEND" ]; then
            printf '\n%s\n' "$CLOUDFLARE_PUBLIC_ENV_APPEND" >> .env.local
          fi
          if [ -n "$OPENAI_API_KEY" ] && ! grep -q '^OPENAI_API_KEY=' .env.local; then
            printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" >> .env.local
          fi
          if [ -n "$ANTHROPIC_API_KEY" ] && ! grep -q '^ANTHROPIC_API_KEY=' .env.local; then
            printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" >> .env.local
          fi
          if ! grep -q '^AITUBERKIT_SERVER_SECRET_ACCESS_MODE=' .env.local; then
            printf '%s\n' 'AITUBERKIT_SERVER_SECRET_ACCESS_MODE=demo' >> .env.local
          fi
          if ! grep -q '^AITUBERKIT_ALLOWED_ORIGINS=' .env.local; then
            printf '%s\n' 'AITUBERKIT_ALLOWED_ORIGINS=https://aituberkit.com,https://www.aituberkit.com' >> .env.local
          fi
          if ! grep -q '^AITUBERKIT_DEMO_RATE_LIMIT_PER_MINUTE=' .env.local; then
            printf '%s\n' 'AITUBERKIT_DEMO_RATE_LIMIT_PER_MINUTE=20' >> .env.local
          fi
          if ! grep -q '^AITUBERKIT_TRUST_PROXY_HEADERS=' .env.local; then
            printf '%s\n' 'AITUBERKIT_TRUST_PROXY_HEADERS=true' >> .env.local
          fi
          node scripts/normalize-cloudflare-env.js .env.local
        env:
          CLOUDFLARE_ENV_FILE: ${{ secrets.CLOUDFLARE_ENV_FILE }}
          CLOUDFLARE_PUBLIC_ENV_APPEND: ${{ secrets.CLOUDFLARE_PUBLIC_ENV_APPEND }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build for Cloudflare
        run: npm run build:cloudflare

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --secrets-file .cloudflare-runtime-secrets.json
